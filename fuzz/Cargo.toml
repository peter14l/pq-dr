[package]
name = "pq-aura-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1.3", features = ["derive"] }

[dependencies.pq-aura]
path = ".."

[[bin]]
name = "decrypt_fuzz"
path = "fuzz_targets/decrypt_fuzz.rs"
test = false
doc = false

[[bin]]
name = "decapsulate_fuzz"
path = "fuzz_targets/decapsulate_fuzz.rs"
test = false
doc = false

[[bin]]
name = "header_fuzz"
path = "fuzz_targets/header_fuzz.rs"
test = false
doc = false

[[bin]]
name = "serialize_fuzz"
path = "fuzz_targets/serialize_fuzz.rs"
test = false
doc = false

[[bin]]
name = "handshake_fuzz"
path = "fuzz_targets/handshake_fuzz.rs"
test = false
doc = false
